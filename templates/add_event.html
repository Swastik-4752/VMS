{% extends 'base.html' %}
{% block title %}Add Event{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h2>Add New Event</h2>
    <p class="page-subtitle">Schedule a new event for a club.</p>
  </div>
  <a href="{{ url_for('events') }}" class="btn btn-secondary"><i data-lucide="arrow-left"></i> Back to Events</a>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('add_event') }}" novalidate>

    <div class="form-row">
      <div class="form-group">
        <label for="name">Event Name <span class="required">*</span></label>
        <input type="text" id="name" name="name"
               placeholder="e.g. Annual Hackathon" required />
      </div>
      <div class="form-group">
        <label for="date">Event Date <span class="required">*</span></label>
        <input type="date" id="date" name="date" required />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="location">Location</label>
        <input type="text" id="location" name="location"
               placeholder="e.g. Main Auditorium, Block B Room 204" />
      </div>
      <div class="form-group">
        <label for="club_id">Organising Club <span class="required">*</span></label>
        <select id="club_id" name="club_id" required>
          <option value="" disabled selected>Select a club</option>
          {% for club in clubs %}
          <option value="{{ club.id }}">{{ club.name }}{% if club.coordinator_name %} - {{ club.coordinator_name }}{% endif %}</option>
          {% endfor %}
        </select>
        {% if not clubs %}
        <span class="field-hint field-warn">
          <i data-lucide="triangle-alert"></i> No clubs available. <a href="{{ url_for('add_club') }}">Add a club first.</a>
        </span>
        {% endif %}
      </div>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" name="description" rows="4"
                placeholder="Brief overview of the event - activities, schedule, expectations..."></textarea>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary" {% if not clubs %}disabled{% endif %}>
        <i data-lucide="calendar-plus"></i> Add Event
      </button>
      <a href="{{ url_for('events') }}" class="btn btn-secondary">Cancel</a>
    </div>

  </form>
</div>
{% endblock %}
