{% extends 'base.html' %}
{% block title %}Add Volunteer{% endblock %}

{% block content %}
<div class="page-header">
  <div>
    <h2>Add New Volunteer</h2>
    <p class="page-subtitle">Fill in the details to register a new volunteer.</p>
  </div>
  <a href="{{ url_for('volunteers') }}" class="btn btn-secondary"><i data-lucide="arrow-left"></i> Back to Volunteers</a>
</div>

<div class="form-card">
  <form method="POST" action="{{ url_for('add_volunteer') }}" novalidate>

    <div class="form-row">
      <div class="form-group">
        <label for="name">Full Name <span class="required">*</span></label>
        <input type="text" id="name" name="name"
               placeholder="e.g. Rahul Verma" required />
      </div>
      <div class="form-group">
        <label for="email">College Email <span class="required">*</span></label>
        <input type="email" id="email" name="email"
               placeholder="e.g. rahul@college.edu" required />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" name="phone"
               placeholder="e.g. 9876543210"
               pattern="[0-9]{10}" maxlength="10" />
      </div>
      <div class="form-group">
        <label for="department">Department</label>
        <input type="text" id="department" name="department"
               placeholder="e.g. Computer Science" />
      </div>
    </div>

    <div class="form-row">
      <div class="form-group">
        <label for="year_of_study">Year of Study <span class="required">*</span></label>
        <select id="year_of_study" name="year_of_study" required>
          <option value="" disabled selected>Select year</option>
          <option value="1">1st Year</option>
          <option value="2">2nd Year</option>
          <option value="3">3rd Year</option>
          <option value="4">4th Year</option>
        </select>
      </div>
      <div class="form-group">
        <label for="skills">Skills</label>
        <input type="text" id="skills" name="skills"
               placeholder="e.g. Python, Design, Photography" />
        <span class="field-hint">Separate multiple skills with commas</span>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn btn-primary"><i data-lucide="user-plus"></i> Register Volunteer</button>
      <a href="{{ url_for('volunteers') }}" class="btn btn-secondary">Cancel</a>
    </div>

  </form>
</div>
{% endblock %}
