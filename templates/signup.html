{% extends 'base.html' %}
{% block title %}Sign Up{% endblock %}

{% block content %}
<div class="login-wrapper">
  <div class="login-card signup-card">

    <div class="login-header">
      <div class="login-logo"><i data-lucide="user-plus"></i></div>
      <h1>Create Account</h1>
      <p>Choose admin or volunteer access and complete your profile.</p>
    </div>

    <form method="POST" action="{{ url_for('signup') }}" class="login-form" novalidate>
      <div class="role-picker" aria-label="Choose role">
        <label class="role-option">
          <input type="radio" name="role" value="volunteer" checked />
          <span><i data-lucide="user-round"></i> Volunteer</span>
        </label>
        <label class="role-option">
          <input type="radio" name="role" value="admin" />
          <span><i data-lucide="shield"></i> Admin</span>
        </label>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="name">Full Name <span class="required">*</span></label>
          <input type="text" id="name" name="name" placeholder="Your full name" required />
        </div>
        <div class="form-group">
          <label for="email">Email <span class="required">*</span></label>
          <input type="email" id="email" name="email" placeholder="you@college.edu" required />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label for="username">Username <span class="required">*</span></label>
          <input type="text" id="username" name="username" placeholder="Choose username" required />
        </div>
        <div class="form-group volunteer-only">
          <label for="department">Department</label>
          <input type="text" id="department" name="department" placeholder="Computer Science" />
        </div>
      </div>

      <div class="form-row">
        <div class="form-group volunteer-only">
          <label for="year_of_study">Year of Study</label>
          <select id="year_of_study" name="year_of_study">
            <option value="1">1st Year</option>
            <option value="2">2nd Year</option>
            <option value="3">3rd Year</option>
            <option value="4">4th Year</option>
          </select>
        </div>
        <div class="form-group">
          <label for="password">Password <span class="required">*</span></label>
          <div class="input-password-wrap">
            <input type="password" id="password" name="password" placeholder="Create password" autocomplete="new-password" required />
            <button type="button" class="toggle-pw" onclick="togglePassword('password', this)" title="Show or hide password" aria-label="Show or hide password">
              <i data-lucide="eye"></i>
            </button>
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="confirm_password">Confirm Password <span class="required">*</span></label>
        <input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" autocomplete="new-password" required />
      </div>

      <button type="submit" class="btn btn-primary btn-full">
        <i data-lucide="user-plus"></i> Create Account
      </button>
    </form>

    <div class="auth-links">
      <a href="{{ url_for('login') }}">Admin login</a>
      <span></span>
      <a href="{{ url_for('volunteer_login') }}">Volunteer login</a>
    </div>

  </div>
</div>
{% endblock %}
